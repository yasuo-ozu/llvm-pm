name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test / ${{ matrix.platform.label }} / LLVM ${{ matrix.llvm.version }}
    runs-on: ${{ matrix.platform.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: Linux
            runs-on: ubuntu-latest
            rust-toolchain: stable
          - label: Windows (MSVC)
            runs-on: windows-latest
            rust-toolchain: stable-msvc
          - label: macOS (macos-latest)
            runs-on: macos-latest
            rust-toolchain: stable
          - label: macOS (macos-13)
            runs-on: macos-13
            rust-toolchain: stable
        llvm:
          #- version: 10
          #  tag: "10.0.1"
          #  feature: llvm10-0,llvm-plugin-crate
          #- version: 11
          #  tag: "11.0.1"
          #  feature: llvm11-0,llvm-plugin-crate
          #- version: 12
          #  tag: "12.0.1"
          #  feature: llvm12-0,llvm-plugin-crate
          #- version: 13
          #  tag: "13.0.1"
          #  feature: llvm13-0,llvm-plugin-crate
          #- version: 14
          #  tag: "14.0.6"
          #  feature: llvm14-0,llvm-plugin-crate
          #- version: 15
          #  tag: "15.0.7"
          #  feature: llvm15-0,llvm-plugin-crate
          #- version: 16
          #  tag: "16.0.6"
          #  feature: llvm16-0,llvm-plugin-crate
          - version: 17
            tag: "17.0.6"
            feature: llvm17-0,llvm-plugin-crate
          - version: 18
            tag: "18.1.8"
            feature: llvm18-0,llvm-plugin-crate
          - version: 19
            tag: "19.1.7"
            feature: llvm19-1
          - version: 20
            tag: "20.1.8"
            feature: llvm20-1
          - version: 21
            tag: "21.1.4"
            feature: llvm21-1
          - version: 22
            tag: "22.1.0"
            feature: llvm22-1
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM ${{ matrix.llvm.version }}
        uses: ./.github/actions/install-llvm
        with:
          version: ${{ matrix.llvm.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.platform.rust-toolchain }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.platform.runs-on }}-llvm${{ matrix.llvm.version }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform.runs-on }}-llvm${{ matrix.llvm.version }}-

      - name: Build
        run: cargo build --workspace --no-default-features --features ${{ matrix.llvm.feature }} --verbose

      - name: Test
        run: cargo test --workspace --no-default-features --features ${{ matrix.llvm.feature }} --verbose

      - name: Run example
        run: cargo run --example all_pass_kinds --no-default-features --features ${{ matrix.llvm.feature }} --verbose

  msrv:
    name: MSRV (Rust 1.65) / LLVM 18 and doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        uses: ./.github/actions/install-llvm
        with:
          version: "18.1.8"

      - name: Install Rust MSRV
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.65.0"

      - name: Doc
        run: cargo doc --no-deps --verbose --workspace

      - name: Test (MSRV)
        run: cargo test --workspace --no-default-features --features llvm18-0,llvm-plugin-crate --verbose

  fmt-clippy:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        uses: ./.github/actions/install-llvm
        with:
          version: "18.1.8"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        uses: ./.github/actions/install-llvm
        with:
          version: "18.1.8"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage
        run: cargo tarpaulin --workspace --no-default-features --features llvm18-0 --out xml --output-dir coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
